<style>
:root{--bg:#0a0a0a;--bg1:#141414;--bg2:#1c1c1c;--bg3:#262626;--bg4:#333;--tx:#e5e5e5;--tx2:#a3a3a3;--tx3:#737373;--tx4:#525252;--red:#ef4444;--orange:#f59e0b;--blue:#38bdf8;--green:#22c55e;--purple:#a78bfa;--yellow:#fbbf24;--font:'DM Sans','Helvetica Neue',system-ui,sans-serif;--mono:'DM Mono','SF Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;font-size:13px;}
.hdr{background:var(--bg);border-bottom:1px solid var(--bg3);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100;}
.cnt{max-width:1640px;margin:0 auto;padding:16px 20px;}
.btn{border:none;padding:8px 18px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s;}.btn:hover{opacity:.85;}.btn:disabled{opacity:.4;cursor:default;}
.btn-p{background:var(--tx);color:var(--bg);}.btn-s{background:var(--bg3);color:var(--tx2);}.btn-sm{padding:5px 12px;font-size:10px;border-radius:5px;}
.crd{background:var(--bg1);border:1px solid var(--bg3);border-radius:10px;padding:14px;margin-bottom:12px;}
.stat{background:var(--bg1);border-radius:8px;padding:12px 14px;flex:1;min-width:120px;}.stat-v{font-size:20px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums;}.stat-l{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
table{width:100%;border-collapse:collapse;font-size:11px;}thead{position:sticky;top:0;z-index:5;}
th{padding:7px;text-align:left;border-bottom:2px solid var(--bg3);color:var(--tx3);font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;user-select:none;white-space:nowrap;background:var(--bg);}th:hover{color:var(--tx2);}th.sorted{color:var(--tx);border-bottom-color:var(--tx);}
td{padding:6px 7px;border-bottom:1px solid #1a1a1a;}tr:nth-child(even){background:#0f0f0f;}tr:hover{background:#1a1a1a !important;}

.bar-w{display:flex;align-items:center;gap:3px;min-width:60px;}.bar-bg{width:36px;height:4px;background:var(--bg3);border-radius:3px;overflow:hidden;}.bar-f{height:100%;border-radius:3px;}.bar-v{font-size:9px;color:var(--tx3);font-variant-numeric:tabular-nums;}

.info-b{padding:10px 12px;border-radius:7px;margin-bottom:12px;}.info-blue{background:#0c1929;border-left:3px solid var(--blue);}.info-amber{background:#1c1007;border-left:3px solid var(--orange);}.info-green{background:#051a0e;border-left:3px solid var(--green);}.info-red{background:#1c0707;border-left:3px solid var(--red);}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.fade{animation:fadeIn .25s ease-out;}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--bg3);border-top-color:var(--tx);border-radius:50%;animation:sp .6s linear infinite;}@keyframes sp{to{transform:rotate(360deg)}}
.fg{position:relative;}.fg label{font-size:8px;color:var(--tx4);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.4px;}
.finput{background:var(--bg1);color:var(--tx);border:1px solid var(--bg3);padding:6px 9px;border-radius:5px;font-size:11px;font-family:var(--font);min-width:140px;}.finput:focus{outline:none;border-color:var(--tx3);}.finput::placeholder{color:var(--tx4);}
.fchips{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;max-width:360px;}.fchip{display:inline-flex;align-items:center;gap:2px;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600;background:var(--bg3);color:var(--tx2);cursor:pointer;}.fchip .x{font-size:11px;color:var(--tx3);margin-left:1px;}.fchip .x:hover{color:var(--red);}
.fdrop{position:absolute;top:100%;left:0;min-width:260px;max-height:240px;background:var(--bg1);border:1px solid var(--bg3);border-radius:7px;box-shadow:0 6px 20px rgba(0,0,0,.5);z-index:50;margin-top:3px;overflow:hidden;}
.fdrop-search{width:100%;padding:7px 9px;border:none;border-bottom:1px solid var(--bg3);background:transparent;color:var(--tx);font-size:11px;font-family:var(--font);}.fdrop-search:focus{outline:none;}
.fdrop-item{padding:5px 10px;cursor:pointer;font-size:10px;display:flex;align-items:center;gap:5px;}.fdrop-item:hover{background:var(--bg3);}.fdrop-item.sel{background:var(--bg2);color:var(--green);}
.fdrop-item .ck{width:13px;height:13px;border:1px solid var(--bg4);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:9px;}.fdrop-item.sel .ck{background:var(--green);border-color:var(--green);color:var(--bg);}
.fdrop-actions{padding:5px 8px;border-top:1px solid var(--bg3);display:flex;gap:5px;justify-content:flex-end;}.fdrop-actions button{background:none;border:none;color:var(--tx3);font-size:9px;font-family:var(--font);cursor:pointer;padding:2px 6px;border-radius:3px;}.fdrop-actions button:hover{background:var(--bg3);}
.cbx-l{font-size:10px;cursor:pointer;display:flex;align-items:center;gap:4px;color:var(--tx2);}.cbx-l input{accent-color:var(--tx2);}
.nf-panel{background:var(--bg1);border:1px solid var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:12px;}
.nf-title{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}.nf-title:hover{color:var(--tx2);}
.nf-grid{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}.nf-group label{font-size:8px;color:var(--tx4);text-transform:uppercase;letter-spacing:.3px;}
.nf-row{display:flex;gap:3px;align-items:center;}.nf-input{background:var(--bg);color:var(--tx);border:1px solid var(--bg3);padding:4px 6px;border-radius:4px;font-size:10px;font-family:var(--mono);width:70px;}.nf-input:focus{outline:none;border-color:var(--tx3);}.nf-sep{color:var(--tx4);font-size:9px;}
.nf-presets{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}.nf-pre{padding:3px 8px;border-radius:4px;font-size:9px;font-weight:600;cursor:pointer;border:1px solid var(--bg3);background:var(--bg);color:var(--tx3);font-family:var(--font);}.nf-pre:hover{border-color:var(--tx3);color:var(--tx2);}.nf-pre.on{border-color:var(--green);color:var(--green);}
.exec{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:14px;}
.exec-card{background:var(--bg1);border:1px solid var(--bg3);border-radius:8px;padding:14px;}.exec-card h4{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}.exec-big{font-size:24px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums;}.exec-sub{font-size:10px;color:var(--tx3);margin-top:3px;line-height:1.4;}
.sim-panel{background:var(--bg1);border:1px solid var(--bg3);border-radius:10px;padding:16px;margin-bottom:14px;}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin:12px 0;}
.sim-cell{background:var(--bg);border-radius:6px;padding:10px;text-align:center;}.sim-cell .v{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;}.sim-cell .l{font-size:8px;color:var(--tx3);text-transform:uppercase;margin-top:2px;}
.sim-bar{display:flex;height:20px;border-radius:5px;overflow:hidden;background:var(--bg3);margin:4px 0;}.sim-bar div{display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--bg);min-width:2px;}
.sim-reco{margin-top:12px;padding:10px;background:var(--bg);border-radius:6px;border-left:3px solid var(--blue);}.sim-reco h5{font-size:10px;font-weight:700;color:var(--blue);margin-bottom:5px;}.sim-reco p{font-size:10px;color:var(--tx3);line-height:1.5;}
.sim-tabs{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}.sim-tab{padding:5px 12px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--bg3);background:var(--bg);color:var(--tx3);font-family:var(--font);}.sim-tab:hover{border-color:var(--tx3);}.sim-tab.on{border-color:var(--yellow);color:var(--yellow);}
.fbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:flex-end;}
.dl-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
</style>
</head>
<body>
<div id="app"></div>
<script>
const W={sales:.25,units:.20,profitability:.40,margin:.15},TH=25,BPT=.55;
const fmt=n=>(n==null||isNaN(n))?"—":n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fP=n=>(n==null||isNaN(n))?"—":(n*100).toFixed(1)+"%";
const fI=n=>(n==null||isNaN(n))?"—":Math.round(n).toLocaleString();
const fS=n=>(n==null||isNaN(n))?"—":n.toFixed(1);
const esc=s=>{const d=document.createElement("div");d.textContent=s;return d.innerHTML;};

// ═══ SATURATION LEVELS ═══
const SAT_LEVELS={
  muy_saturada:{label:"Muy Saturada",actMod:0.50,retMod:1.15,color:"var(--red)"},
  saturada:{label:"Saturada",actMod:0.70,retMod:1.08,color:"var(--orange)"},
  medio_saturada:{label:"Medio Saturada",actMod:0.85,retMod:1.03,color:"var(--yellow)"},
  no_saturada:{label:"No Saturada",actMod:1.00,retMod:1.00,color:"var(--green)"}
};

// ═══ TRAMOS — localStorage persistence ═══
function loadTramos(){try{return JSON.parse(localStorage.getItem("assortOptTramos"))||{};}catch(e){return{};}}
function saveTramos(data){localStorage.setItem("assortOptTramos",JSON.stringify(data));}
function getTramosForClasif(clasificacion){if(!clasificacion)return null;const all=loadTramos();const key=clasificacion.toUpperCase();return all[key]||null;}

function parseTramos(wb){
  const ws=wb.Sheets[wb.SheetNames[0]],rng=XLSX.utils.decode_range(ws["!ref"]);
  const c=(r,col)=>{const a=XLSX.utils.encode_cell({r,c:col});return ws[a]?ws[a].v:null;};
  // Find columns: Local, Clasificación, Tramos
  const hdr=[];for(let i=0;i<=rng.e.c;i++)hdr.push((c(0,i)||"").toString().toLowerCase().trim());
  let cLocal=-1,cClasif=-1,cTramos=-1;
  hdr.forEach((h,i)=>{
    if(h.includes("local"))cLocal=i;
    else if(h.includes("clasif")||h.includes("categoria")||h.includes("clasif"))cClasif=i;
    else if(h.includes("tramo")||h.includes("gondola")||h.includes("módulo")||h.includes("modulo"))cTramos=i;
  });
  if(cLocal<0||cClasif<0||cTramos<0)throw new Error("Archivo de tramos debe tener columnas: Local, Clasificación, Tramos");
  const result={};
  for(let r=1;r<=rng.e.r;r++){
    const local=(c(r,cLocal)||"").toString().trim();
    const clasif=(c(r,cClasif)||"").toString().trim().toUpperCase();
    const tramos=parseFloat(c(r,cTramos))||0;
    if(!local||!clasif||tramos<=0)continue;
    if(!result[clasif])result[clasif]={};
    result[clasif][local]=tramos;
  }
  return result;
}

// ═══ PERCENTILE — handles ties ═══
function pctRank(arr,val){const n=arr.length;if(n<=1)return 50;let bw=0,eq=0;for(const v of arr){if(v<val-0.0001)bw++;else if(Math.abs(v-val)<0.0001)eq++;}return Math.min(((bw+.5*eq)/n)*100,100);}

// ═══ PARSE FILES ═══
function extractClasifName(filename){
  // Try to get classification name from filename e.g. "Ventas_Arroz_2024.xlsx" → "ARROZ"
  if(!filename)return"";
  const n=filename.replace(/\.(xlsx|xls|csv)$/i,"").replace(/[_\-]/g," ");
  // Remove common words
  const skip=new Set(["ventas","venta","reporte","data","archivo","pivot","cruzada","2024","2025","2026","enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"]);
  const words=n.split(/\s+/).filter(w=>!skip.has(w.toLowerCase())&&w.length>1);
  return words.join(" ").toUpperCase()||"";
}

function parseVentas(wb,filename){
  const ws=wb.Sheets[wb.SheetNames[0]],rng=XLSX.utils.decode_range(ws["!ref"]);
  const c=(r,col)=>{const a=XLSX.utils.encode_cell({r,c:col});return ws[a]?ws[a].v:null;};
  const r2=[];for(let i=0;i<=rng.e.c;i++)r2.push((c(1,i)||"").toString().toLowerCase().trim());
  let cm={};
  // Detect clasificación vs sub clasificación: "subclas" → subClasif; "clasificaci" without "sub" → clasificación
  r2.forEach((h,i)=>{
    if(h.includes("subclas"))cm.sc=i;
    else if((h.includes("clasificaci")||h.includes("clasificac"))&&!h.includes("sub"))cm.cf=i;
    else if(h.includes("origen"))cm.or=i;
    else if(h.includes("proveedor")||h.includes("supplier"))cm.pv=i;
    else if(h.includes("marca")||h.includes("brand"))cm.mk=i;
    else if(h==="item"||h.includes("producto")||h.includes("sku"))cm.it=i;
    else if(h.includes("tamaño")||h.includes("tamano"))cm.tm=i;
    else if(h.includes("clase merc")||h.includes("mercadería")||h.includes("mercaderia"))cm.cl=i;
  });
  // Fallback: if no separate subClasif found but clasificación exists, look again for any "clasif" col that could be subClasif
  // If neither cm.sc nor cm.cf found, try generic "clasificaci" for sc (backwards compat)
  if(cm.sc==null&&cm.cf==null){r2.forEach((h,i)=>{if(h.includes("clasificaci"))cm.sc=i;});}
  let flc=-1;
  for(let i=0;i<=rng.e.c;i++){const r0=(c(0,i)||"").toString(),r1=(c(1,i)||"").toString().toLowerCase();if(r0&&r1.includes("venta")&&!r0.toLowerCase().includes("local")&&!r0.toLowerCase().includes("total")){flc=i;break;}}
  if(flc<0)throw new Error("No se detectaron columnas de locales.");
  const locs=[];for(let i=flc;i<=rng.e.c;i+=4){const n=(c(0,i)||"").toString().trim();if(!n||n.toLowerCase()==="total")break;locs.push({col:i,name:n});}
  const subClasifSet=new Set(),clasificSet=new Set();
  const items=[];
  for(let r=2;r<=rng.e.r;r++){
    const iv=cm.it!=null?(c(r,cm.it)||"").toString().trim():"";if(!iv||iv==="Total")continue;
    const sc=cm.sc!=null?(c(r,cm.sc)||"").toString().trim():"SIN SC";
    const cf=cm.cf!=null?(c(r,cm.cf)||"").toString().trim():"";
    subClasifSet.add(sc);
    if(cf)clasificSet.add(cf);
    const or=cm.or!=null?(c(r,cm.or)||"").toString().trim():"",pv=cm.pv!=null?(c(r,cm.pv)||"").toString().trim():"",mk=cm.mk!=null?(c(r,cm.mk)||"").toString().trim():"",tm=cm.tm!=null?(c(r,cm.tm)||"").toString().trim():"",cl=cm.cl!=null?(c(r,cm.cl)||"").toString().trim():"";
    for(const l of locs){items.push({local:l.name,clasificacion:cf,subClasif:sc,item:iv,tamano:tm,marca:mk,proveedor:pv,origen:or,claseMerc:cl,esImportado:/import/i.test(or),ventaUSD:parseFloat(c(r,l.col))||0,cantidad:parseFloat(c(r,l.col+1))||0,rentabilidad:parseFloat(c(r,l.col+2))||0,margen:parseFloat(c(r,l.col+3))||0});}
  }
  const clasificaciones=[...clasificSet].sort();
  const isMultiClasif=clasificaciones.length>1;
  // Display label: always from filename (informative), clasificaciones array for data
  const clasificacion=extractClasifName(filename)||( clasificaciones.length?clasificaciones[0]:"");
  return{items,locals:locs.map(l=>l.name),subClasifs:[...subClasifSet].sort(),clasificacion,clasificaciones,isMultiClasif};
}

function parseAlcances(wb){
  const ws=wb.Sheets[wb.SheetNames[0]],rng=XLSX.utils.decode_range(ws["!ref"]);
  const c=(r,col)=>{const a=XLSX.utils.encode_cell({r,c:col});return ws[a]?ws[a].v:null;};
  const cell=(r,col)=>{const a=XLSX.utils.encode_cell({r,c:col});return ws[a]||null;};
  // Detect date column at col B (check rows 0 and 1 for "fec"/"fecha"/"inicio")
  const h0=(c(0,1)||"").toString().toLowerCase(),h1=(c(1,1)||"").toString().toLowerCase();
  const hasDate=/(fec|fecha|inicio)/.test(h0)||/(fec|fecha|inicio)/.test(h1);
  const locStart=hasDate?2:1;
  const locs=[];for(let i=locStart;i<=rng.e.c;i++){const n=(c(0,i)||"").toString().trim();if(n)locs.push({col:i,name:n});}
  const m={},alcDates={};
  for(let r=2;r<=rng.e.r;r++){
    const it=(c(r,0)||"").toString().trim();if(!it)continue;
    // Parse date from col B if present
    let dt=null;
    if(hasDate){const dc=cell(r,1);if(dc){if(dc.t==='d')dt=new Date(dc.v);else if(dc.t==='n'&&dc.v)dt=new Date((dc.v-25569)*86400000);else if(dc.t==='s'&&dc.v){const p=Date.parse(dc.v);if(!isNaN(p))dt=new Date(p);}}}
    if(!m[it])m[it]=new Set();
    for(const l of locs){
      if(c(r,l.col)===1){
        m[it].add(l.name);
        if(dt){if(!alcDates[it])alcDates[it]={};if(!alcDates[it][l.name]||dt<alcDates[it][l.name])alcDates[it][l.name]=dt;}
      }
    }
  }
  return{alcMap:m,alcDates};
}

// ═══ ANALYSIS ═══
function runAnalysis(vd,ad){
  const ak=new Set(Object.keys(ad.alcMap));
  const fil=vd.items.filter(r=>ak.has(r.item)&&ad.alcMap[r.item].has(r.local));
  // Group key includes clasificacion for multi-clasif support
  const grp={};fil.forEach(r=>{const k=r.local+"|||"+(r.clasificacion||"")+"|||"+r.subClasif+"|||"+r.item;if(!grp[k])grp[k]=[];grp[k].push(r);});
  const sums0=Object.values(grp).map(recs=>{const f=recs[0];let vS=0,cS=0,rS=0,mS=0;recs.forEach(r=>{vS+=r.ventaUSD;cS+=r.cantidad;rS+=r.rentabilidad;mS+=r.margen;});
    // Calculate mesesActivos from alcDates
    let mesesActivos=12;
    if(ad.alcDates&&ad.alcDates[f.item]&&ad.alcDates[f.item][f.local]){const dt=ad.alcDates[f.item][f.local];const yr=dt.getFullYear();if(yr<2025)mesesActivos=12;else if(yr===2025)mesesActivos=Math.max(1,12-dt.getMonth());else mesesActivos=1;}
    return{...f,totalVenta:vS,totalCant:cS,totalRent:rS,avgMargen:mS/recs.length,mesesActivos};});
  // Filter out items with < 4 meses activos
  const sums=sums0.filter(s=>s.mesesActivos>=4);
  // Monthly averages
  sums.forEach(s=>{s.vtaPromMes=s.totalVenta/s.mesesActivos;s.cantPromMes=s.totalCant/s.mesesActivos;s.rentPromMes=s.totalRent/s.mesesActivos;});
  // Percentile groups: local + clasificacion + subClasif (items compared within their classification)
  const bg={};sums.forEach(s=>{const k=s.local+"|||"+(s.clasificacion||"")+"|||"+s.subClasif;if(!bg[k])bg[k]=[];bg[k].push(s);});
  const res=[],bf={};
  Object.values(bg).forEach(items=>{
    if(items.length<2)return;
    const sA=items.map(i=>i.vtaPromMes),uA=items.map(i=>i.cantPromMes),rA=items.map(i=>i.rentPromMes),mA=items.map(i=>i.avgMargen);
    items.forEach(it=>{
      const pS=pctRank(sA,it.vtaPromMes),pU=pctRank(uA,it.cantPromMes),pR=pctRank(rA,it.rentPromMes),pM=pctRank(mA,it.avgMargen);
      const cs=W.sales*pS+W.units*pU+W.profitability*pR+W.margin*pM;
      const fl=cs<TH&&!it.esImportado&&it.rentPromMes<=10,ifl=cs<TH&&it.esImportado;
      const rz=[];if(pS<TH)rz.push("Baja venta");if(pU<TH)rz.push("Baja rotación");if(pR<TH)rz.push("Baja rent.");if(pM<20)rz.push("Bajo margen");
      let sev="";if(cs<10)sev="CRITICO";else if(cs<20)sev="MUY_BAJO";else if(cs<TH)sev="BAJO";
      let ir="";if(ifl){if(pR<10&&pS<10)ir="Renegociar urgente";else if(pS<TH&&pU<TH)ir="Revisar exhibición/precio";else if(pR<TH&&pM<20)ir="Renegociar costo";else ir="Monitorear";}
      it.pSales=pS;it.pUnits=pU;it.pRent=pR;it.pMargin=pM;it.compositeScore=cs;it.flagged=fl;it.impFlagged=ifl;it.importReco=ir;it.reasons=rz;it.groupSize=items.length;it.severity=sev;
      // Brand tracking

      if(!it.esImportado){bf[bk].total++;if(fl)bf[bk].flagged++;else bf[bk].good.push(it);}
      bf[bk].subClasifs.add(it.subClasif);bf[bk].allItems.push(it);
      res.push(it);
    });
    // Recovery rate per flagged item: how many non-flagged remain in same group
    const nGood=items.filter(i=>!i.flagged&&!i.impFlagged).length;
    items.forEach(it=>{it.recoveryRate=nGood>0?Math.min(0.50, 0.10 + (nGood/(nGood+4))*0.45):0;});
  });
  // Brand analysis: if ANY item has good performance, suggest partial removal
  const br=Object.values(bf).filter(b=>b.total>=3&&b.flagged/b.total>=BPT).map(b=>{
    const pct=b.flagged/b.total;
    const allBad=b.good.length===0;
    return{...b,pct,subClasifs:[...b.subClasifs],
      tipo:allBad?"RETIRAR COMPLETA":"DESCODIFICAR",
      goodItems:b.good.map(g=>({item:g.item,score:g.compositeScore,vta:g.totalVenta,rent:g.totalRent})),
      desc:allBad
        ?`Retirar marca completa: ${b.flagged}/${b.total} items con bajo rendimiento`
        :`Descodificar marca: ${b.flagged}/${b.total} bajo rend., mantener ${b.good.length} item(s) con buen desempeño`};

}

// ═══ ACTIVATION RECOMMENDATIONS ═══
function buildActivationRecos(analysis,tramosData,satLevel){
  const R=analysis.results,alcMap=analysis._alcMap;if(!alcMap)return[];
  const satConf=SAT_LEVELS[satLevel||"no_saturada"]||SAT_LEVELS.no_saturada;
  // Count items per local for density
  const itemsByLocal={};R.forEach(r=>{itemsByLocal[r.local]=(itemsByLocal[r.local]||0)+1;});
  const sp={};R.forEach(r=>{if(!sp[r.local])sp[r.local]={};sp[r.local][r.item]=(sp[r.local][r.item]||0)+r.vtaPromMes;});
  const locals=Object.keys(sp),allItems=[...new Set(R.map(r=>r.item))];
  function cosSim(a,b){let d=0,na=0,nb=0;for(const it of allItems){const va=a[it]||0,vb=b[it]||0;d+=va*vb;na+=va*va;nb+=vb*vb;}return(na>0&&nb>0)?d/(Math.sqrt(na)*Math.sqrt(nb)):0;}
  const simMap={};for(const loc of locals){const sims=[];for(const o of locals){if(o===loc)continue;sims.push({local:o,sim:cosSim(sp[loc],sp[o])});}sims.sort((a,b)=>b.sim-a.sim);simMap[loc]=sims.slice(0,5).filter(s=>s.sim>.3);}
  const ip={};R.forEach(r=>{if(!ip[r.item])ip[r.item]={};ip[r.item][r.local]={vta:r.vtaPromMes,rent:r.rentPromMes,cant:r.cantPromMes,mrg:r.avgMargen,score:r.compositeScore,clasificacion:r.clasificacion||"",subClasif:r.subClasif,marca:r.marca,tamano:r.tamano,proveedor:r.proveedor,origen:r.origen};});
  // Count items per local+clasificacion+subClasif for cannibalization
  const scCount={};R.forEach(r=>{const k=r.local+"|||"+(r.clasificacion||"")+"|||"+r.subClasif;scCount[k]=(scCount[k]||0)+1;});
  // Total sales per local+clasificacion+subClasif for cannibalization
  const scSales={};R.forEach(r=>{const k=r.local+"|||"+(r.clasificacion||"")+"|||"+r.subClasif;if(!scSales[k])scSales[k]={vta:0,rent:0};scSales[k].vta+=r.totalVenta;scSales[k].rent+=r.totalRent;});
  // Count flagged (low-perf) items per local+clasificacion+subClasif — these are swap candidates
  const scFlagged={};R.forEach(r=>{const k=r.local+"|||"+(r.clasificacion||"")+"|||"+r.subClasif;if(!scFlagged[k])scFlagged[k]=0;if(r.flagged&&!r.esImportado)scFlagged[k]++;});

  const recos=[];
  for(const loc of locals){
    const ss=simMap[loc];if(!ss||!ss.length)continue;
    const locAlc=new Set();for(const[item,locs]of Object.entries(alcMap))if(locs.has(loc))locAlc.add(item);
    for(const item of allItems){
      if(locAlc.has(item)||!alcMap[item])continue;
      const pis=[];for(const s of ss)if(ip[item]&&ip[item][s.local]){const p=ip[item][s.local];if(p.score>=40&&p.vta>0)pis.push({local:s.local,sim:s.sim,...p});}
      if(pis.length>=2){
        const aV=pis.reduce((s,p)=>s+p.vta,0)/pis.length,aR=pis.reduce((s,p)=>s+p.rent,0)/pis.length,aC=pis.reduce((s,p)=>s+p.cant,0)/pis.length,aM=pis.reduce((s,p)=>s+p.mrg,0)/pis.length,aS=pis.reduce((s,p)=>s+p.score,0)/pis.length,aSim=pis.reduce((s,p)=>s+p.sim,0)/pis.length;
        const cf=Math.min(pis.length/3,1.5);
        const str=(.40*Math.max(aR,0)+.25*Math.max(aV,0)+.20*Math.max(aC,0)+.15*Math.max(aM*100,0))*aSim*cf;
        const ref=pis[0];
        // Cannibalization: more items in same clasif+subclas = higher cannibalization
        const scKey=loc+"|||"+(ref.clasificacion||"")+"|||"+ref.subClasif;
        const nItems=scCount[scKey]||0;
        const catSales=scSales[scKey]||{vta:0,rent:0};
        // Rate: from 20% (few items) to 65% (many items)
        const cannibRate=Math.min(0.65, 0.20 + (nItems / (nItems + 5)) * 0.50);
        const netVta=aV*(1-cannibRate);
        const netRent=aR*(1-cannibRate);
        const netCant=aC*(1-cannibRate);

        // Tramos/density modifier — never hard-blocks, only adjusts strength
        let localTramos=null,density=null,tramosMod=1,densityWarning=false,swapOpportunity=false,swapReason="";
        const nFlagged=scFlagged[scKey]||0;

        if(tramosData&&tramosData[loc]){
          localTramos=tramosData[loc];
          const localItems=itemsByLocal[loc]||0;
          density=localItems/localTramos;
          if(density>5)densityWarning=true;

          // Base penalty from density
          const densityPenalty=Math.min(0.5,Math.max(0,(density-3)/10));
          tramosMod=Math.max(0.3,1-densityPenalty);

          // Swap opportunity: there are flagged items in same local+SC that can be retired to make room
          if(nFlagged>0){
            // Boost back: each flagged item recovers some of the penalty (up to full recovery)
            const swapBoost=Math.min(1.0,nFlagged*0.15);
            tramosMod=Math.min(1.0,tramosMod+(1-tramosMod)*swapBoost);
            swapOpportunity=true;
            swapReason=nFlagged+" item(s) a retirar en misma SC — espacio disponible";
          }

          // Strong opportunity override: if the activation is very good, don't penalize much
          // avgScore>=60 = top performer in similar stores, netRent strongly positive
          if(aS>=60&&netRent>0){
            tramosMod=Math.max(tramosMod,0.85);
            if(!swapOpportunity)swapReason="Oportunidad fuerte (score "+aS.toFixed(0)+")";
          }
        }else{
          tramosMod=1;
          // Even without tramos data, note swap opportunities
          if(nFlagged>0){swapOpportunity=true;swapReason=nFlagged+" item(s) a retirar en misma SC";}
        }

        const adjStr=str*tramosMod;

        // Build reason text
        let reasonText;
        if(aR>0)reasonText=`Rent neta $${netRent.toFixed(2)} (${Math.round((1-cannibRate)*100)}% incr.) en ${pis.length} loc. sim.`;
        else reasonText=`Vta neta $${netVta.toFixed(2)} en ${pis.length} loc. (score ${aS.toFixed(0)})`;
        if(swapReason)reasonText+=` · ${swapReason}`;

        recos.push({targetLocal:loc,item,clasificacion:ref.clasificacion||"",subClasif:ref.subClasif,marca:ref.marca,tamano:ref.tamano,proveedor:ref.proveedor,origen:ref.origen,storesCarrying:pis.length,avgVta:aV,avgRent:aR,avgCant:aC,avgMrg:aM,avgScore:aS,avgSim:aSim,strength:adjStr,topStores:pis.map(p=>p.local).slice(0,3),
          cannibRate,netVta,netRent,netCant,itemsInSC:nItems,
          tramos:localTramos,density,tramosMod,densityWarning,swapOpportunity,nFlaggedInSC:nFlagged,
          reason:reasonText});
      }
    }
  }
  // Minimum netRent threshold: exclude activations below $15/mes
  let filtered0=recos.filter(r=>r.netRent>=15);
  filtered0.sort((a,b)=>b.strength-a.strength);
  // Saturation filter: limit activations per local — prioritize by netRent
  if(satConf.actMod<1){
    const byLoc={};filtered0.forEach(r=>{if(!byLoc[r.targetLocal])byLoc[r.targetLocal]=[];byLoc[r.targetLocal].push(r);});
    const filtered=[];
    for(const[loc,lr] of Object.entries(byLoc)){
      lr.sort((a,b)=>b.netRent-a.netRent);
      const keep=Math.max(1,Math.round(lr.length*satConf.actMod));
      filtered.push(...lr.slice(0,keep));
    }
    filtered.sort((a,b)=>b.strength-a.strength);
    return filtered;
  }
  return filtered0;
}

// ═══ SIMULATION ═══
function simulate(results,level){
  const R=results,totV=R.reduce((s,r)=>s+r.totalVenta,0),totR=R.reduce((s,r)=>s+r.totalRent,0),totU=R.reduce((s,r)=>s+r.totalCant,0);
  const totVM=R.reduce((s,r)=>s+(r.vtaPromMes||0),0),totRM=R.reduce((s,r)=>s+(r.rentPromMes||0),0);
  let rem;
  if(level==="all")rem=R.filter(r=>r.flagged);else if(level==="critico")rem=R.filter(r=>r.flagged&&r.severity==="CRITICO");else if(level==="muy_bajo")rem=R.filter(r=>r.flagged&&(r.severity==="CRITICO"||r.severity==="MUY_BAJO"));else rem=[];
  const remSet=new Set(rem.map(r=>r.local+"|||"+r.item));
  const rV=rem.reduce((s,r)=>s+r.totalVenta,0),rR=rem.reduce((s,r)=>s+r.totalRent,0),rU=rem.reduce((s,r)=>s+r.totalCant,0);
  const rVM=rem.reduce((s,r)=>s+(r.vtaPromMes||0),0),rRM=rem.reduce((s,r)=>s+(r.rentPromMes||0),0),rUM=rem.reduce((s,r)=>s+(r.cantPromMes||0),0);
  // Recovery: count remaining (non-removed) items per local+subClasif
  const scRemain={};R.forEach(r=>{const k=r.local+"|||"+r.subClasif;if(!scRemain[k])scRemain[k]=0;if(!remSet.has(r.local+"|||"+r.item))scRemain[k]++;});
  // Calculate recovery per removed item: more remaining items = higher recovery
  let recVtaM=0,recRentM=0;
  rem.forEach(r=>{const k=r.local+"|||"+r.subClasif;const nRem=scRemain[k]||0;const recRate=nRem>0?Math.min(0.50, 0.10 + (nRem/(nRem+4))*0.45):0;recVtaM+=(r.vtaPromMes||0)*recRate;recRentM+=(r.rentPromMes||0)*recRate;});
  const avgRecRate=rVM>0?(recVtaM/rVM):0;
  const bySC={},byMarca={},byProv={};
  rem.forEach(r=>{
    const k=r.local+"|||"+r.subClasif;const nRem=scRemain[k]||0;const recRate=nRem>0?Math.min(0.50, 0.10 + (nRem/(nRem+4))*0.45):0;
    const vtaNet=(r.vtaPromMes||0)*(1-recRate),rentNet=(r.rentPromMes||0)*(1-recRate);
    if(!bySC[r.subClasif])bySC[r.subClasif]={n:0,vta:0,rent:0,vtaM:0,rentM:0,vtaN:0,rentN:0};bySC[r.subClasif].n++;bySC[r.subClasif].vta+=r.totalVenta;bySC[r.subClasif].rent+=r.totalRent;bySC[r.subClasif].vtaM+=(r.vtaPromMes||0);bySC[r.subClasif].rentM+=(r.rentPromMes||0);bySC[r.subClasif].vtaN+=vtaNet;bySC[r.subClasif].rentN+=rentNet;
    if(!byMarca[r.marca])byMarca[r.marca]={n:0,vta:0,rent:0,vtaM:0,rentM:0,vtaN:0,rentN:0};byMarca[r.marca].n++;byMarca[r.marca].vta+=r.totalVenta;byMarca[r.marca].rent+=r.totalRent;byMarca[r.marca].vtaM+=(r.vtaPromMes||0);byMarca[r.marca].rentM+=(r.rentPromMes||0);byMarca[r.marca].vtaN+=vtaNet;byMarca[r.marca].rentN+=rentNet;
    if(!byProv[r.proveedor])byProv[r.proveedor]={n:0,vta:0,rent:0,vtaM:0,rentM:0,vtaN:0,rentN:0};byProv[r.proveedor].n++;byProv[r.proveedor].vta+=r.totalVenta;byProv[r.proveedor].rent+=r.totalRent;byProv[r.proveedor].vtaM+=(r.vtaPromMes||0);byProv[r.proveedor].rentM+=(r.rentPromMes||0);byProv[r.proveedor].vtaN+=vtaNet;byProv[r.proveedor].rentN+=rentNet;
  });

  return{totV,totR,totU,totN:R.length,totVM,totRM,rV,rR,rU,rN:rem.length,rVM,rRM,rUM,recVtaM,recRentM,avgRecRate,netVM,netRM,bySC,byMarca,byProv,uI:new Set(rem.map(r=>r.item)).size,uL:new Set(rem.map(r=>r.local)).size,
    pV:rV/(totV||1),pR:rR/(totR||1),pU:rU/(totU||1),pN:rem.length/(R.length||1),aV:totV-rV,aR:totR-rR,aVM:totVM-rVM,aRM:totRM-rRM};

function _zipCreate(files){

  var dosDate=(((now.getFullYear()-1980)<<9)|((now.getMonth()+1)<<5)|now.getDate())&0xFFFF;
  for(var i=0;i<files.length;i++){
    var f=files[i],nm=_te(f.name),d=f.data,crc=_crc32(d);

    var lh=new Uint8Array(30+nm.length);var v=new DataView(lh.buffer);
    v.setUint32(0,0x04034b50,true);v.setUint16(4,20,true);v.setUint16(6,0,true);v.setUint16(8,0,true);
    v.setUint16(10,dosTime,true);v.setUint16(12,dosDate,true);v.setUint32(14,crc,true);
    v.setUint32(18,d.length,true);v.setUint32(22,d.length,true);v.setUint16(26,nm.length,true);
    lh.set(nm,30);

    var ch=new Uint8Array(46+nm.length);var cv=new DataView(ch.buffer);
    cv.setUint32(0,0x02014b50,true);cv.setUint16(4,20,true);cv.setUint16(6,20,true);cv.setUint16(8,0,true);
    cv.setUint16(10,0,true);cv.setUint16(12,dosTime,true);cv.setUint16(14,dosDate,true);cv.setUint32(16,crc,true);
    cv.setUint32(20,d.length,true);cv.setUint32(24,d.length,true);cv.setUint16(28,nm.length,true);
    cv.setUint32(42,off,true);ch.set(nm,46);

  }
  // End of central dir
  var cdOff=off,cdSize=0;for(var j=0;j<cd.length;j++){parts.push(cd[j]);cdSize+=cd[j].length;}
  var eocd=new Uint8Array(22);var ev=new DataView(eocd.buffer);
  ev.setUint32(0,0x06054b50,true);ev.setUint16(8,files.length,true);ev.setUint16(10,files.length,true);
  ev.setUint32(12,cdSize,true);ev.setUint32(16,cdOff,true);

async function analyze(){
  if(!S.ventasFiles.length||!S.alcancesFiles.length){ss({error:"Sube ambos archivos"});return;}
  ss({loading:true,error:""});
  try{
    const vWbs=await Promise.all(S.ventasFiles.map(f=>readF(f)));
    const aWbs=await Promise.all(S.alcancesFiles.map(f=>readF(f)));
    // Combine ventas
    let combItems=[],combLocs=new Set(),combSCs=new Set(),combClasifs=new Set(),fileLabels=[];
    vWbs.forEach((wb,i)=>{
      const vd=parseVentas(wb,S.ventasFiles[i].name);
      fileLabels.push(vd.clasificacion);
      // If file has no clasificación column, stamp items with filename-derived clasif
      if(vd.clasificaciones.length===0&&vd.clasificacion){
        const cl=vd.clasificacion.toUpperCase();
        vd.items.forEach(it=>{it.clasificacion=cl;});
        combClasifs.add(cl);
      } else {
        vd.clasificaciones.forEach(c=>combClasifs.add(c));
      }
      combItems=combItems.concat(vd.items);
      vd.locals.forEach(l=>combLocs.add(l));
      vd.subClasifs.forEach(s=>combSCs.add(s));
    });
    const clasificaciones=[...combClasifs].sort();
    const isMultiClasif=clasificaciones.length>1;
    const cLabel=S.ventasFiles.length>1&&S.analysisName.trim()?S.analysisName.trim():(fileLabels[0]||"");
    const vd={items:combItems,locals:[...combLocs].sort(),subClasifs:[...combSCs].sort(),clasificacion:cLabel,clasificaciones,isMultiClasif};
    // Combine alcances
    const mergedAlc={},mergedDates={};
    aWbs.forEach(wb=>{const ad=parseAlcances(wb);for(const[it,s]of Object.entries(ad.alcMap)){if(!mergedAlc[it])mergedAlc[it]=new Set();s.forEach(l=>mergedAlc[it].add(l));}
      for(const[it,locals]of Object.entries(ad.alcDates||{})){if(!mergedDates[it])mergedDates[it]={};for(const[loc,dt]of Object.entries(locals)){if(!mergedDates[it][loc]||dt<mergedDates[it][loc])mergedDates[it][loc]=dt;}}});
    const ad={alcMap:mergedAlc,alcDates:mergedDates};
    const r=runAnalysis(vd,ad);
    r._alcMap=ad.alcMap;
    // Tramos: only for single-classification (multi-clasif tramos TBD)
    const tramosData=!vd.isMultiClasif?getTramosForClasif(vd.clasificacion):null;
    r._tramosData=tramosData;r._satLevel=S.satLevel;
    if(tramosData){
      const itemsByLocal={};r.results.forEach(x=>{itemsByLocal[x.local]=(itemsByLocal[x.local]||0)+1;});
      r.results.forEach(x=>{const tr=tramosData[x.local];x.tramos=tr||null;x.density=tr?itemsByLocal[x.local]/tr:null;});
    }
    r.activationRecos=buildActivationRecos(r,tramosData,S.satLevel);
    allLocals=[...new Set(r.results.map(x=>x.local))].sort();
    allClasifs=[...new Set(r.results.map(x=>x.clasificacion).filter(Boolean))].sort();
    allSCs=[...new Set(r.results.map(x=>x.subClasif))].sort();
    allMarcas=[...new Set(r.results.map(x=>x.marca))].sort();
    allProvs=[...new Set(r.results.map(x=>x.proveedor))].sort();
    ss({analysis:r,step:"results",loading:false,page:0,tab:"exec",resDim:r.isMultiClasif?"clasificacion":"subClasif"});
  }catch(e){ss({error:"Error: "+e.message,loading:false});}
}

  const{results:R,brandRemovals:BR,zeroItems:ZI,activationRecos:AR}=S.analysis;
  let base=R.filter(i=>{
    if(S.selLocals.size>0&&!S.selLocals.has(i.local))return false;
    if(S.selClasifs.size>0&&!S.selClasifs.has(i.clasificacion))return false;
    if(S.selSCs.size>0&&!S.selSCs.has(i.subClasif))return false;
    if(S.selMarcas.size>0&&!S.selMarcas.has(i.marca))return false;
    if(S.selProvs.size>0&&!S.selProvs.has(i.proveedor))return false;
    if(S.txtItem&&!i.item.toLowerCase().includes(S.txtItem.toLowerCase()))return false;
    if(!matchRange(i.totalVenta,S.nfVentaMin,S.nfVentaMax))return false;
    if(!matchRange(i.totalCant,S.nfCantMin,S.nfCantMax))return false;
    if(!matchRange(i.totalRent,S.nfRentMin,S.nfRentMax))return false;
    if(!matchRange(i.avgMargen,S.nfMargenMin,S.nfMargenMax))return false;
    if(!matchRange(i.compositeScore,S.nfScoreMin,S.nfScoreMax))return false;
    return true;
  });
  let items=doSort(base.filter(i=>!i.esImportado));if(S.onlyFlagged)items=items.filter(i=>i.flagged);
  let imp=doSort(base.filter(i=>i.esImportado&&i.impFlagged));
  let brands=BR.filter(b=>{
    if(S.selLocals.size>0&&!S.selLocals.has(b.local))return false;
    if(S.selClasifs.size>0&&!b.allItems.some(it=>S.selClasifs.has(it.clasificacion)))return false;
    if(S.selMarcas.size>0&&!S.selMarcas.has(b.marca))return false;
    if(S.selSCs.size>0&&!b.subClasifs.some(sc=>S.selSCs.has(sc)))return false;
    if(S.selProvs.size>0&&!b.allItems.some(it=>S.selProvs.has(it.proveedor)))return false;
    if(S.txtItem&&!b.allItems.some(it=>it.item.toLowerCase().includes(S.txtItem.toLowerCase())))return false;
    return true;
  });
  let zeros=ZI.filter(z=>{
    if(S.selLocals.size>0&&!S.selLocals.has(z.local))return false;
    if(S.selClasifs.size>0&&!S.selClasifs.has(z.clasificacion))return false;
    if(S.selSCs.size>0&&!S.selSCs.has(z.subClasif))return false;
    if(S.selMarcas.size>0&&!S.selMarcas.has(z.marca))return false;
    if(S.selProvs.size>0&&!S.selProvs.has(z.proveedor))return false;
    if(S.txtItem&&!z.item.toLowerCase().includes(S.txtItem.toLowerCase()))return false;
    return true;
  });
  let recos=(AR||[]).filter(r=>{
    if(S.selLocals.size>0&&!S.selLocals.has(r.targetLocal))return false;
    if(S.selClasifs.size>0&&!S.selClasifs.has(r.clasificacion))return false;
    if(S.selSCs.size>0&&!S.selSCs.has(r.subClasif))return false;
    if(S.selMarcas.size>0&&!S.selMarcas.has(r.marca))return false;
    if(S.selProvs.size>0&&!S.selProvs.has(r.proveedor))return false;
    if(S.txtItem&&!r.item.toLowerCase().includes(S.txtItem.toLowerCase()))return false;
    return true;
  });
  // Sort recos
  const d2=S.sortDir==="asc"?1:-1;const sk=S.sortBy==="local"?"targetLocal":S.sortBy;
  recos.sort((a,b)=>{const av=a[sk],bv=b[sk];if(av==null&&bv==null)return 0;if(typeof av==="string")return(av||"").localeCompare(bv||"")*d2;return((av||0)-(bv||0))*d2;});

  const fl=base.filter(i=>i.flagged),vfl=fl.reduce((s,i)=>s+i.totalVenta,0),vt=base.reduce((s,i)=>s+i.totalVenta,0);
  const rfl=fl.reduce((s,i)=>s+i.totalRent,0),rtot=base.reduce((s,i)=>s+i.totalRent,0);
  const stats={total:base.length,fl:fl.length,vfl,vt,rfl,rtot,impFl:base.filter(i=>i.impFlagged).length};
  const bySC={};base.forEach(r=>{if(!bySC[r.subClasif])bySC[r.subClasif]=[];bySC[r.subClasif].push(r);});
  const scSummary=Object.entries(bySC).map(([sc,its])=>{const fl2=its.filter(i=>i.flagged),vfl2=fl2.reduce((s,i)=>s+i.totalVenta,0),vtot=its.reduce((s,i)=>s+i.totalVenta,0);return{sc,total:its.length,fl:fl2.length,pct:fl2.length/its.length,impFl:its.filter(i=>i.impFlagged).length,vfl:vfl2,vtot,vPct:vfl2/(vtot||1)};}).sort((a,b)=>b.pct-a.pct);
  return{items,imp,brands,zeros,stats,scSummary,recos,base};
}

        <div class="sim-cell"><div class="v" style="color:var(--tx3)">$${fmt(tBV)}</div><div class="l">Vta bruta/mes</div></div>
        <div class="sim-cell"><div class="v" style="color:var(--orange)">-$${fmt(cannibV)}</div><div class="l">Canibalización (~${(avgCn*100).toFixed(0)}%)</div></div>
        <div class="sim-cell" style="border:1px solid var(--green);border-radius:6px"><div class="v" style="color:var(--green)">$${fmt(tNV)}</div><div class="l">VTA NETA/MES</div></div>
        <div class="sim-cell"><div class="v" style="color:var(--tx3)">$${fmt(tBR)}</div><div class="l">Rent bruta/mes</div></div>
        <div class="sim-cell"><div class="v" style="color:var(--orange)">-$${fmt(cannibR)}</div><div class="l">Canibalización rent</div></div>
        <div class="sim-cell" style="border:1px solid #c084fc;border-radius:6px"><div class="v" style="color:#c084fc">$${fmt(tNR)}</div><div class="l">RENT NETA/MES</div></div>
      </div>
      <div style="font-size:9px;color:var(--tx3);margin:8px 0 3px">VENTA: bruta vs canibalización vs neta</div>
      <div class="sim-bar"><div style="width:${Math.round((tNV/(tBV||1))*100)}%;background:var(--green)">${Math.round((tNV/(tBV||1))*100)}% neta</div><div style="width:${Math.round((cannibV/(tBV||1))*100)}%;background:var(--orange)">${Math.round((cannibV/(tBV||1))*100)}% canib.</div></div>
      ${actTbl(grpAct("subClasif"),"Sub Clasif.")}
      ${actTbl(grpAct("marca"),"Marca")}
      ${actTbl(grpAct("proveedor"),"Proveedor")}
      <div class="sim-reco"><h5>PLAN DE ACTIVACIÓN</h5><p>
        <strong style="color:var(--tx2)">1.</strong> Crear alcance en locales destino (priorizar por fuerza).<br>
        <strong style="color:var(--tx2)">2.</strong> La canibalización es esperada — el incremento neto es la ganancia real.<br>
        <strong style="color:var(--tx2)">3.</strong> Asegurar abastecimiento y exhibición adecuada.<br>
        <strong style="color:var(--tx2)">4.</strong> Medir vs expectativa neta a 30-60 días.
      </p></div>
    </div>`;
  }


  const clrAll=`ss({selLocals:new Set(),selClasifs:new Set(),selSCs:new Set(),selMarcas:new Set(),selProvs:new Set(),txtItem:'',page:0,nfVentaMin:null,nfVentaMax:null,nfCantMin:null,nfCantMax:null,nfRentMin:null,nfRentMax:null,nfMargenMin:null,nfMargenMax:null,nfScoreMin:null,nfScoreMax:null})`;

  const _satBtns=Object.entries(SAT_LEVELS).map(([k,v])=>`<button class="nf-pre ${S.satLevel===k?"on":""}" onclick="changeSat('${k}')" style="font-size:8px;padding:2px 6px;${S.satLevel===k?"border-color:"+v.color+";color:"+v.color:""}">${v.label}</button>`).join("");
  app.innerHTML=`
    <div class="hdr"><div><span style="font-size:16px;font-weight:800;letter-spacing:-.5px">${CL?CL+" — ":""}ASSORTMENT OPTIMIZER</span><span style="font-size:10px;color:var(--tx4);margin-left:8px">${base.length.toLocaleString()} items${aF>0?" (filtrado)":""} · ${new Set(base.map(r=>r.local)).size} loc${a.isMultiClasif?" · "+a.clasificaciones.length+" clasif.":""} · Sub clasif: ${new Set(base.map(r=>r.subClasif)).size}</span></div><div style="display:flex;align-items:center;gap:6px"><span style="font-size:8px;color:var(--tx4)">Saturación:</span><div class="nf-presets" style="margin:0;gap:3px">${_satBtns}</div><button class="btn btn-s btn-sm" onclick="goTramos()">⚙ Tramos</button><button class="btn btn-s btn-sm" onclick="doExportExcel()">⬇ Excel</button><button class="btn btn-sm" style="background:#7c3aed;color:#fff;border:none" onclick="doExportPPTX()">⬇ Presentación</button><button class="btn btn-s btn-sm" onclick="resetApp()">Nuevo</button></div></div>
    <div class="cnt">
      <div class="fbar">
        ${multiSel("locals","LOCAL",allLocals,S.selLocals,"Locales...")}
        ${allClasifs.length>1?multiSel("clasifs","CLASIF.",allClasifs,S.selClasifs,"Clasificación..."):""}
        ${multiSel("scs","SUB CLASIF.",allSCs,S.selSCs,"Sub clasif...")}
        ${multiSel("marcas","MARCA",allMarcas,S.selMarcas,"Marcas...")}
        ${multiSel("provs","PROVEEDOR",allProvs,S.selProvs,"Proveedores...")}
        <div class="fg"><label>ITEM</label><input class="finput" placeholder="Buscar..." value="${esc(S.txtItem)}" oninput="ss({txtItem:this.value,page:0})" style="min-width:120px"></div>
        <div><label class="cbx-l"><input type="checkbox" ${S.onlyFlagged?"checked":""} onchange="ss({onlyFlagged:this.checked,page:0})"> Solo flaggeados</label></div>
        ${aF?`<div><button class="btn btn-s btn-sm" onclick="${clrAll}">✕ (${aF})</button></div>`:""}
      </div>
      ${numFilterHTML()}
      <div class="tab-bar">${tabs.map(t=>t.sep?`<span class="tab-sep">${t.label}</span>`:`<button class="tab-b ${S.tab===t.id?"on":""}" onclick="ss({tab:'${t.id}',page:0})">${t.label}</button>`).join("")}</div>
      ${content}
    </div>`;
}

render();
</script>
</body>
</html>
